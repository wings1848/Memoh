appId: ai.memoh.desktop
productName: Memoh
copyright: Copyright © 2026 Memoh
directories:
  buildResources: build
  output: dist
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintrc.cjs,.eslintignore,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
asarUnpack:
  - resources/**
extraResources:
  - from: resources/server
    to: server
  - from: resources/cli
    to: cli
  - from: resources/runtime
    to: runtime
  - from: resources/config
    to: config
  - from: resources/providers
    to: providers
  - from: resources/qdrant
    to: qdrant
    filter:
      - ${env.MEMOH_DESKTOP_QDRANT_TARGET}/**/*
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  icon: build/icon.icns
  artifactName: ${productName}-Desktop-${version}-mac-${arch}.${ext}
  notarize: false
linux:
  category: Utility
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  maintainer: Memoh
  icon: build/icon.png
  artifactName: ${productName}-Desktop-${version}-linux-${arch}.${ext}
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico
  artifactName: ${productName}-Desktop-${version}-win-${arch}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
npmRebuild: false
